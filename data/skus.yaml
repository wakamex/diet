# Curated Kroger SKUs after a discovery pass. ~80 in production; seed has 15 staples
# spanning the dietary modes well enough that 4 of 5 LPs solve and produce non-trivial
# baskets. Vegan is intentionally left infeasible in the seed — the only fortified-D
# item is soy milk and the 500 g/day cap can't deliver 15 mcg D from soy milk alone.
# This is the honest result the plan calls out (vit D + B12 in vegan diets typically
# need a supplement or a fortified cereal SKU added to skus.yaml).
#
# `unit_grams` is the package weight in grams (Kroger price is per package; FDC gives
# nutrients per 100 g, so we need this to align units in the LP).
# `dietary_categories` controls mode filtering (see MODE_EXCLUDES in diet/solver.py).
# `fdc_id` is the USDA FoodData Central food id.

