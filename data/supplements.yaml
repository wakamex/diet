# Supplement SKUs with label-sourced per-tablet nutrients.
# FDC does not cover supplements — nutrient values here come from the Kroger
# Supplement Facts panel (US label). Tablet weights are rough measurements of
# typical Kroger-brand tablets; price and package size come from Kroger.
#
# LP mechanics: `unit_grams` is the per-package net weight (count × tablet_g),
# consistent with the rest of the pipeline. The LP picks grams/day of each
# supplement and the website rounds display to tablets/day via tablet_g.
#
# The `supplement` dietary_category is NOT in any mode's MODE_EXCLUDES, so
# supplements are available across omnivore, pescatarian, vegetarian, ovo_lacto,
# and vegan — subject to the top-level `--with-supplements` toggle.

- product_id: "0004126001650"
  name: "Kroger® Men's Multivitamin One Daily Tablets"
  count: 240
  tablet_g: 1.3
  dietary_categories: [supplement, multivitamin]
  # Tablets capped at 1/day.
  max_tablets_per_day: 1
  nutrients_per_tablet:
    vit_a_mcg:    900
    vit_c_mg:     90
    vit_d_mcg:    20
    vit_e_mg:     13.5
    vit_b12_mcg:  6
    folate_mcg:   400
    calcium_mg:   210
    iron_mg:      18
    magnesium_mg: 100
    potassium_mg: 80
    zinc_mg:      11

- product_id: "0004126001928"
